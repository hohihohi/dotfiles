# ---------------------------
# pattern: Execute 'sources' to the completion which is generated by the script from my dotfile-repo
# The generation script is created locally, so it can be referenced locally...
# But it is managed remotely (to updated the script regularly via github pipeline)
# They can use 'defer loading', so they help start up zsh more fastly.
# use: please specify the zsh file
